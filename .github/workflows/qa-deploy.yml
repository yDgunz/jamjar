name: QA Deploy

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  pull-requests: write

concurrency:
  group: qa-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      (github.event.action == 'labeled' && github.event.label.name == 'deploy-qa') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'deploy-qa'))
    runs-on: ubuntu-latest
    steps:
      - name: Sanitize branch name
        id: branch
        env:
          RAW_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          SANITIZED=$(echo "$RAW_BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's|[^a-z0-9-]|-|g' | sed 's|-\+|-|g' | sed 's|^-\+||;s|-\+$||' | cut -c1-63)

          if [[ "$SANITIZED" =~ ^(main|master|prod)$ ]]; then
            echo "::error::Reserved branch name: $SANITIZED"
            exit 1
          fi

          echo "name=$SANITIZED" >> "$GITHUB_OUTPUT"
          echo "raw=$RAW_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Deploy QA environment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e
            source /opt/jamjar/.env
            export JAM_QA_PASSWORD
            /opt/jamjar/scripts/qa-deploy.sh \
              "${{ steps.branch.outputs.name }}" \
              "https://github.com/${{ github.repository }}.git" \
              "${{ steps.branch.outputs.raw }}"

      - name: Comment on PR
        uses: actions/github-script@v8
        with:
          script: |
            const branch = '${{ steps.branch.outputs.name }}';
            const url = `https://${branch}.jam-jar.app`;
            const marker = '<!-- qa-deploy -->';
            const body = `${marker}\n🔗 **QA environment deployed:** ${url}\n\nLogin with any seeded user and the QA password.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
